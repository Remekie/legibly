<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legibly — AI Visibility Scanner</title>
  <meta name="description" content="Paste your URL. Legibly scans 7 signals, grades your AI visibility A–F, and hands you copy-paste fixes." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav aria-label="Site navigation">
    <a href="/landing.html" class="nav-brand" aria-label="Legibly home">legibly</a>
    <span class="nav-label">AI Visibility Scanner</span>
  </nav>

  <main>
    <header class="app-header">
      <h1 class="app-heading">Can AI crawlers actually read your site?</h1>
      <p class="app-sub">GPTBot doesn't execute JavaScript — if your site runs on React, Lovable, or Vite, AI sees an empty page.</p>
    </header>

    <section class="scan-box" aria-label="Site scanner">
      <form id="scan-form" novalidate>
        <label for="url-input" class="sr-only">Your website URL</label>
        <div class="input-row">
          <input
            id="url-input"
            type="url"
            name="url"
            placeholder="yoursite.com"
            autocomplete="url"
            inputmode="url"
            required
            aria-required="true"
            aria-describedby="url-error"
          />
          <button type="submit" id="scan-btn">Scan free</button>
        </div>
        <p id="url-error" class="field-error" role="alert" aria-live="polite" hidden></p>
      </form>
    </section>

    <section id="result" aria-live="polite" aria-atomic="true" hidden>
      <!-- Populated by scan.js -->
    </section>
  </main>

  <script src="scan.js" type="module"></script>
</body>
</html>
