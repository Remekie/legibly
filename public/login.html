<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — BlindGEO</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:    #0a0a0a;
      --paper:  #ffffff;
      --hi:     #e8ff47;
      --pass:   #4ade80;
      --fail:   #f87171;
      --muted:  #6b7280;
      --border: #e5e5e0;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Public Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Nav */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Libre Baskerville', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
      text-decoration: none;
    }

    /* Login card */
    .login-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
    }
    .login-card h1 {
      font-family: 'Libre Baskerville', serif;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .login-card .subtitle {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* Error/info banners */
    .banner {
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }
    .banner.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .banner.info  { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .banner.show  { display: block; }

    /* Auth buttons */
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 20px;
      background: var(--ink);
      color: var(--hi);
      border: none;
      border-radius: 6px;
      font-family: 'Public Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn-google:hover { opacity: 0.85; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--muted);
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Email form */
    .email-form { display: flex; flex-direction: column; gap: 10px; }
    .email-form input[type="email"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'Public Sans', sans-serif;
      font-size: 15px;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }
    .email-form input[type="email"]:focus { border-color: var(--ink); }
    .btn-email {
      width: 100%;
      padding: 12px 20px;
      background: var(--paper);
      color: var(--ink);
      border: 1.5px solid var(--ink);
      border-radius: 6px;
      font-family: 'Public Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-email:hover { background: #f5f5f3; }
    .btn-email:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Footer */
    .login-footer {
      padding: 20px 24px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
    .login-footer a { color: var(--muted); }

    /* Google icon SVG */
    .google-icon { width: 18px; height: 18px; flex-shrink: 0; }

    .terms {
      font-size: 12px;
      color: var(--muted);
      margin-top: 16px;
      line-height: 1.5;
    }
    .terms a { color: var(--muted); }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-logo">BlindGEO</a>
  </nav>

  <div class="login-wrap">
    <div class="login-card">
      <h1>Sign in to BlindGEO</h1>
      <p class="subtitle">See your AI visibility grade, track improvements over time, and get copy-paste fixes.</p>

      <div id="banner-error" class="banner error"></div>
      <div id="banner-info"  class="banner info"></div>

      <a href="/auth/google" class="btn-google">
        <svg class="google-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#e8ff47" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#e8ff47" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#e8ff47" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#e8ff47" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </a>

      <div class="divider">or</div>

      <form class="email-form" id="email-form" novalidate>
        <input type="email" id="email-input" placeholder="you@company.com" autocomplete="email" required>
        <button type="submit" class="btn-email" id="email-btn">Continue with email →</button>
      </form>

      <p class="terms">
        By signing in, you agree to our <a href="/terms">Terms</a> and <a href="/privacy">Privacy Policy</a>.
        No password required.
      </p>
    </div>
  </div>

  <footer class="login-footer">
    blindgeo.com &middot; <a href="/">Back to scanner</a>
  </footer>

  <script>
    // Show error/info from URL params
    const params = new URLSearchParams(location.search);
    const errMap = {
      oauth_failed:    'Google sign-in failed. Please try again.',
      expired_token:   'That login link has expired. Please request a new one.',
      invalid_token:   'Invalid login link. Please request a new one.',
      not_configured:  'Google login is not configured yet. Please use email.',
    };
    const errMsg = errMap[params.get('error')];
    if (errMsg) {
      const el = document.getElementById('banner-error');
      el.textContent = errMsg;
      el.classList.add('show');
    }
    if (params.get('return')) {
      sessionStorage.setItem('login_return', params.get('return'));
    }

    document.getElementById('email-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email  = document.getElementById('email-input').value.trim();
      const btn    = document.getElementById('email-btn');
      const errEl  = document.getElementById('banner-error');
      const infoEl = document.getElementById('banner-info');
      errEl.classList.remove('show');
      infoEl.classList.remove('show');

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errEl.textContent = 'Please enter a valid email address.';
        errEl.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending…';

      try {
        const res = await fetch('/auth/email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error ?? 'Request failed');
        }
        infoEl.textContent = `Check your email — we sent a sign-in link to ${email}.`;
        infoEl.classList.add('show');
        btn.textContent = 'Email sent ✓';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Continue with email →';
      }
    });
  </script>
</body>
</html>
