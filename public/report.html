<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlindGEO — AI Visibility Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dash-body">

  <header class="dash-header">
    <a href="/" class="dash-brand">BlindGEO</a>
    <span class="dash-domain" id="dash-domain"></span>
    <a href="/" class="dash-new-scan">New scan →</a>
  </header>

  <nav class="dash-tabs" role="tablist" aria-label="Report sections">
    <button class="dash-tab active" role="tab" aria-selected="true"  data-tab="overview" aria-controls="pane-overview">Overview</button>
    <button class="dash-tab"        role="tab" aria-selected="false" data-tab="ai-view"  aria-controls="pane-ai-view">AI View</button>
    <button class="dash-tab"        role="tab" aria-selected="false" data-tab="prompts"  aria-controls="pane-prompts">Prompts</button>
    <button class="dash-tab"        role="tab" aria-selected="false" data-tab="fixes"    aria-controls="pane-fixes">Fixes</button>
    <button class="dash-tab"        role="tab" aria-selected="false" data-tab="deploy"   aria-controls="pane-deploy">Deploy</button>
  </nav>

  <main>
    <div id="pane-overview" class="dash-pane" role="tabpanel"></div>
    <div id="pane-ai-view"  class="dash-pane" role="tabpanel"></div>
    <div id="pane-prompts"  class="dash-pane" role="tabpanel"></div>
    <div id="pane-fixes"    class="dash-pane" role="tabpanel"></div>
    <div id="pane-deploy"   class="dash-pane" role="tabpanel"></div>
    <div id="pane-empty"    class="dash-pane" role="tabpanel" style="text-align:center;padding:4rem 1.5rem">
      <p style="color:var(--color-muted);margin-bottom:1rem">No report found. Run a scan first.</p>
      <a href="/" style="color:var(--color-text);font-weight:600">Go to scanner →</a>
    </div>
  </main>

<script>
// ── Utilities ─────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function safeOrigin(url) {
  try { return new URL(url.startsWith('http') ? url : 'https://' + url).origin; } catch { return url; }
}
function humanTextFromHtml(html) {
  if (!html) return '';
  const doc = new DOMParser().parseFromString(html, 'text/html');
  ['nav','footer','header','script','style','aside','noscript'].forEach(s =>
    doc.querySelectorAll(s).forEach(e => e.remove())
  );
  return (doc.body?.innerText ?? '').replace(/\s+/g,' ').trim();
}

// ── Tab switching ─────────────────────────────────────────────────────────────
document.querySelectorAll('.dash-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.dash-tab').forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected','false'); });
    document.querySelectorAll('.dash-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    btn.setAttribute('aria-selected','true');
    document.getElementById('pane-' + btn.dataset.tab)?.classList.add('active');
  });
});

// ── Copy / Download wiring (delegated) ────────────────────────────────────────
document.addEventListener('click', e => {
  const copyBtn = e.target.closest('.copy-btn');
  if (copyBtn) {
    const el = document.getElementById(copyBtn.dataset.target);
    if (el) navigator.clipboard.writeText(el.textContent).then(() => {
      copyBtn.textContent = 'Copied ✓';
      setTimeout(() => copyBtn.textContent = 'Copy', 2000);
    });
  }
  const dlBtn = e.target.closest('.download-btn');
  if (dlBtn) {
    const el = document.getElementById(dlBtn.dataset.target);
    if (!el) return;
    const blob = new Blob([el.textContent], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = dlBtn.dataset.filename ?? 'download.txt';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 60_000);
  }
});

// ── Signal labels / tooltips ──────────────────────────────────────────────────
const SIGNAL_LABELS = {
  prerender: 'AI can read your site',
  robots:    'Search rules are set',
  schema:    'AI knows what you sell',
  llmstxt:   'AI summary is in place',
  content:   'Content answers questions',
  eeat:      'Business credibility signals',
  metadata:  'Pages are described clearly',
};
const SIGNAL_LABELS_FAIL = {
  prerender: "AI can't read your site",
  robots:    'Search rules are missing',
  schema:    "AI doesn't know what you sell",
  llmstxt:   'AI summary is missing',
  content:   "Content doesn't answer questions",
  eeat:      'Business credibility is missing',
  metadata:  "Pages aren't described clearly",
};
const FIX_HINTS = {
  prerender: 'Add a pre-rendering step so AI crawlers receive real HTML, not a JavaScript shell.',
  robots:    'Remove the AI crawler block from your robots.txt (User-agent: GPTBot, Disallow: /).',
  schema:    'Add Organization schema markup to your homepage <head> tag.',
  llmstxt:   'Create a /llms.txt file at your site root describing what your business does.',
  content:   'Rewrite your opening paragraphs to answer customer questions in the first sentence.',
  eeat:      'Add an About page, visible author names, and a contact method.',
  metadata:  'Write a page title and meta description that name your business and what it does.',
};
const INTENT_LABELS = {
  awareness:   'Awareness',
  comparison:  'Comparison',
  decision:    'Decision',
  usecase:     'Use Case',
  postpurchase:'Post-Purchase',
};

// ── Tab renderers ──────────────────────────────────────────────────────────────

function renderOverview(data) {
  const { grade, score, blocker, signals } = data;
  const gradeClass = 'grade-' + (grade ?? 'f').toLowerCase().replace(/[^a-f]/g,'f');

  const signalRows = Object.entries(signals ?? {}).map(([key, s]) => {
    if (s.stub) return `
      <li class="dash-signal dash-signal--stub">
        <span class="dash-signal-icon" aria-hidden="true">·</span>
        <span class="dash-signal-label">${esc(SIGNAL_LABELS[key] ?? key)}</span>
        <span class="dash-signal-detail">Available in full report</span>
      </li>`;
    const status = s.score === 0 ? 'fail' : s.score >= 8 ? 'pass' : 'partial';
    const icon   = status === 'pass' ? '✓' : status === 'fail' ? '✗' : '!';
    const label  = status === 'pass'
      ? (SIGNAL_LABELS[key] ?? key)
      : (SIGNAL_LABELS_FAIL[key] ?? SIGNAL_LABELS[key] ?? key);
    const hint = (status !== 'pass' && FIX_HINTS[key])
      ? `<span class="dash-signal-hint">→ ${esc(FIX_HINTS[key])}</span>` : '';
    return `
      <li class="dash-signal dash-signal--${status}">
        <span class="dash-signal-icon" aria-hidden="true">${icon}</span>
        <span class="dash-signal-label">${esc(label)}</span>
        <span class="dash-signal-detail">${esc(s.detail ?? '')}</span>
        ${hint}
      </li>`;
  }).join('');

  return `
    <div class="${esc(gradeClass)}">
      <div class="dash-grade-row">
        <span class="dash-grade" aria-label="Grade ${esc(grade ?? '?')}">${esc(grade ?? '?')}</span>
        <span class="dash-score">AI Visibility Score: ${esc(String(score ?? 0))}/100</span>
      </div>
      ${blocker ? `<p class="dash-blocker" role="alert">⚠ ${esc(blocker)}</p>` : ''}
      <ul class="dash-signals" aria-label="Signal results">${signalRows}</ul>
      <div class="dash-cta-row">
        <button class="btn-primary" id="pdf-btn" style="font-size:.875rem;padding:.75rem 1.5rem">Download PDF Report</button>
      </div>
    </div>`;
}

function renderAiView(data) {
  const av = data.report?.agentView;
  const humanHtml = data.report?.humanHtml ?? null;

  if (!av) return `<p style="color:var(--color-muted);padding:2rem 0">AI view data not available for this site. The site may have blocked crawlers or returned no content.</p>`;

  const humanText = humanTextFromHtml(humanHtml);
  const humanWordCount = humanText.split(/\s+/).filter(w => w.length > 2).length;

  const missingTags = (av.missingWords ?? []).slice(0, 30)
    .map(w => `<span class="missing-word">${esc(w)}</span>`).join('');

  return `
    <h2 class="dash-section-title">What AI Actually Reads on Your Site</h2>
    <p class="dash-section-sub">The left column is what AI crawlers (GPTBot, ClaudeBot, PerplexityBot) actually ingest from your page. The right column is what a human visitor sees. Every word missing on the left is a missed citation opportunity.</p>

    <div class="ai-view-stats">
      <div class="ai-stat">
        <span class="ai-stat-num" style="color:var(--color-partial)">${esc(String(av.agentWordCount ?? 0))}</span>
        <span class="ai-stat-label">Words AI reads</span>
      </div>
      ${humanWordCount ? `
      <div class="ai-stat">
        <span class="ai-stat-num">${esc(String(humanWordCount))}</span>
        <span class="ai-stat-label">Words humans see</span>
      </div>` : ''}
    </div>

    <div class="ai-view-split">
      <div class="ai-view-panel">
        <div class="ai-view-panel-header">
          Agent View
          <div class="ai-view-panel-sub">Content from HTML comparable to ChatGPT-User fetch</div>
        </div>
        <div class="ai-view-text">${esc(av.full ?? '')}</div>
      </div>
      <div class="ai-view-panel">
        <div class="ai-view-panel-header">
          Human View
          <div class="ai-view-panel-sub">Content in fully loaded page</div>
        </div>
        <div class="ai-view-text">${esc(humanText || 'Human view not available.')}</div>
      </div>
    </div>

    ${missingTags ? `
    <div class="ai-missing-block">
      <div class="missing-words-label">Words visible to humans but invisible to AI crawlers:</div>
      <div class="missing-words-tags">${missingTags}</div>
    </div>` : ''}`;
}

function renderPrompts(data) {
  const report = data.report;
  const prompts = report?.prompts;
  const citations = report?.citations;

  const promptGroups = prompts
    ? Object.entries(prompts).filter(([, v]) => v?.length > 0).map(([intent, list]) => `
        <div class="prompt-intent-group">
          <div class="prompt-intent-head">${esc(INTENT_LABELS[intent] ?? intent)}</div>
          <ul class="prompt-list-dash">
            ${list.map(p => {
              const text = typeof p === 'object' ? p.prompt : p;
              const type = typeof p === 'object' ? p.type : null;
              const tag = type ? `<span class="prompt-tag prompt-tag--${esc(type)}">${esc(type)}</span>` : '';
              return `<li>${tag}"${esc(text)}"</li>`;
            }).join('')}
          </ul>
        </div>`).join('')
    : '';

  let citationHtml = '';
  if (citations) {
    const c = citations;
    const rateColor = c.visibilityRate >= 50 ? 'var(--color-pass)' : c.visibilityRate > 0 ? 'var(--color-partial)' : 'var(--color-fail)';
    const rateLabel = c.visibilityRate >= 50 ? 'appearing in AI results'
      : c.visibilityRate > 0 ? 'appearing in some AI results'
      : 'not appearing in any tested AI results';

    citationHtml = `
      <hr class="dash-divider">
      <h2 class="dash-section-title">Are You Winning These Prompts?</h2>
      <p class="dash-section-sub">We ran your prompts through Perplexity and checked if <strong>${esc(c.domain)}</strong> appears in the answers.</p>
      <div class="citation-score-row">
        <span class="citation-rate" style="color:${rateColor}">${c.promptsAppearing}/${c.promptsTested}</span>
        <span class="citation-label">prompts where your site appears — ${esc(rateLabel)}</span>
        ${c.sentiment ? `<span class="sentiment-badge sentiment-badge--${esc(c.sentiment)}">${esc(c.sentiment)} mentions</span>` : ''}
      </div>
      <div class="citation-results">
        ${(c.results ?? []).map(r => `
          <div class="citation-row ${r.appearing ? 'citation-row--win' : 'citation-row--miss'}">
            <span class="citation-icon">${r.appearing ? '✓' : '✗'}</span>
            <div class="citation-detail">
              <div class="citation-prompt">"${esc(r.prompt)}"</div>
              <div class="citation-verdict ${r.appearing ? 'verdict--win' : 'verdict--miss'}">
                ${r.appearing ? 'Your site appears in this AI answer' : 'Your site does not appear — competitors are winning this prompt'}
              </div>
              ${r.competitors?.length ? `<div class="citation-competitors">Cited instead: ${r.competitors.map(d => `<span class="competitor-tag">${esc(d)}</span>`).join('')}</div>` : ''}
            </div>
          </div>`).join('')}
      </div>
      ${c.competitors?.length ? `
        <div class="competitor-summary">
          <div class="competitor-summary-title">Top competitors appearing in your prompts</div>
          <div class="competitor-list">
            ${c.competitors.map(comp => `
              <div class="competitor-row">
                <span class="competitor-domain">${esc(comp.domain)}</span>
                <span class="competitor-bar-wrap">
                  <span class="competitor-bar" style="width:${Math.round((comp.appearances/comp.total)*100)}%"></span>
                </span>
                <span class="competitor-count">${comp.appearances}/${comp.total} prompts</span>
              </div>`).join('')}
          </div>
        </div>` : ''}`;
  }

  // Provider coverage section (locked for non-report tiers)
  const providerHtml = `
    <hr class="dash-divider">
    <h2 class="dash-section-title">AI Provider Coverage</h2>
    <p class="dash-section-sub">Which AI engines cite your site when answering these prompts.</p>
    <div class="provider-coverage-grid">
      <div class="provider-coverage-row${hasPaidTier('report') ? '' : ''}">
        <div class="provider-coverage-icon provider-perplexity">P</div>
        <div class="provider-coverage-info">
          <div class="provider-coverage-name">Perplexity</div>
          <div class="provider-coverage-sub">Perplexity AI with web search</div>
        </div>
        <div class="provider-coverage-result">${citations ? `${citations.promptsAppearing ?? 0}/${citations.promptsTested ?? 0} prompts` : 'Checked'}</div>
      </div>
      <div class="provider-coverage-row provider-locked">
        <div class="provider-coverage-icon provider-chatgpt">C</div>
        <div class="provider-coverage-info">
          <div class="provider-coverage-name">ChatGPT</div>
          <div class="provider-coverage-sub">OpenAI GPT with web search</div>
        </div>
        <a href="/?upgrade=1" class="provider-upgrade-badge">Upgrade to unlock</a>
      </div>
      <div class="provider-coverage-row provider-locked">
        <div class="provider-coverage-icon provider-gemini">G</div>
        <div class="provider-coverage-info">
          <div class="provider-coverage-name">Google Gemini</div>
          <div class="provider-coverage-sub">Gemini with Google Search grounding</div>
        </div>
        <a href="/?upgrade=1" class="provider-upgrade-badge">Upgrade to unlock</a>
      </div>
    </div>`;

  if (!promptGroups && !citationHtml) return `<p style="color:var(--color-muted);padding:2rem 0">Prompts not generated — ANTHROPIC_API_KEY may not be set.</p>`;

  return `
    <h2 class="dash-section-title">Prompts This Page Should Be Winning</h2>
    <p class="dash-section-sub">Real queries people type into ChatGPT and Perplexity where your site should appear.</p>
    ${promptGroups}
    ${citationHtml}
    ${providerHtml}`;
}

function renderFixes(data) {
  const fixes = data.report?.fixes ?? {};
  const schema = data.report?.schemaRecs;
  const llmstxt = data.report?.llmstxt;

  const fixEntries = Object.values(fixes).filter(Boolean);

  if (!fixEntries.length && !schema && !llmstxt) return `<p style="color:var(--color-muted);padding:2rem 0">No fix data available.</p>`;

  const signalFixes = fixEntries.map((fix, i) => {
    const bodyParts = [];
    if (fix.items) {
      bodyParts.push(fix.items.map(item => `
        <div class="fix-item" style="margin-bottom:.875rem">
          <div style="font-weight:600;font-size:.875rem;margin-bottom:.375rem">${esc(item.label)}</div>
          <div class="code-block-wrap">
            <pre class="code-block" id="fix-${i}-item-${bodyParts.length}">${esc(item.instruction)}</pre>
            <button class="copy-btn" data-target="fix-${i}-item-${bodyParts.length}">Copy</button>
          </div>
        </div>`).join(''));
    } else {
      (fix.options ?? []).forEach((opt, j) => {
        bodyParts.push(`
          <div class="fix-option" style="margin-bottom:.875rem">
            <div style="font-weight:600;font-size:.875rem;margin-bottom:.375rem">${esc(opt.label)}</div>
            <div class="code-block-wrap">
              <pre class="code-block" id="fix-${i}-opt-${j}">${opt.steps.map(s => esc(s)).join('\n')}</pre>
              <button class="copy-btn" data-target="fix-${i}-opt-${j}">Copy</button>
            </div>
            ${opt.note ? `<p class="fix-note">${esc(opt.note)}</p>` : ''}
          </div>`);
      });
    }

    const isFailing = true;
    return `
      <details class="fix-details" ${i === 0 ? 'open' : ''}>
        <summary>
          <span class="fix-badge fix-badge--fail">Failing</span>
          ${esc(fix.title ?? 'Fix')}
        </summary>
        <div class="fix-details-body">${bodyParts.join('')}</div>
      </details>`;
  }).join('');

  const schemaSection = schema?.recommendations?.length ? `
    <hr class="dash-divider">
    <h2 class="dash-section-title">Structured Data to Add</h2>
    <p class="dash-section-sub">Copy and paste each snippet inside a <code>&lt;script type="application/ld+json"&gt;</code> tag in your page <code>&lt;head&gt;</code>.</p>
    ${schema.recommendations.map((rec, i) => `
      <div class="schema-rec" style="margin-bottom:1.25rem">
        <div class="schema-rec-header">
          <span class="schema-type-badge">${esc(rec.type)}</span>
          <span class="schema-reason">${esc(rec.reason)}</span>
        </div>
        <div class="code-block-wrap">
          <pre class="code-block" id="schema-${i}">${esc(rec.snippet)}</pre>
          <button class="copy-btn" data-target="schema-${i}">Copy</button>
        </div>
      </div>`).join('')}` : '';

  const llmsSection = llmstxt?.content ? `
    <hr class="dash-divider">
    <h2 class="dash-section-title">Your llms.txt File</h2>
    <p class="dash-section-sub">Upload this file to <strong id="llms-origin"></strong>/llms.txt so AI engines have a plain-language guide to your site.</p>
    <div class="code-block-wrap">
      <pre class="code-block" id="llmstxt-content">${esc(llmstxt.content)}</pre>
      <div class="code-actions">
        <button class="copy-btn" data-target="llmstxt-content">Copy</button>
        <button class="download-btn" data-target="llmstxt-content" data-filename="llms.txt">Download llms.txt</button>
      </div>
    </div>` : '';

  // Lovable/Bolt/v0 snippets — paste-ready prompts for AI builders
  const snippets = data.report?.lovableSnippets ?? [];
  const lovableSection = snippets.length ? `
    <hr class="dash-divider">
    <h2 class="dash-section-title">Fix in Lovable, Bolt, or v0</h2>
    <p class="dash-section-sub">Built your site with an AI builder? Paste these prompts directly into your builder's chat to apply each fix automatically — no coding needed.</p>
    <div class="lovable-snippets">
      ${snippets.map((s, i) => `
        <details class="fix-details" ${i === 0 ? 'open' : ''}>
          <summary>
            <span class="fix-badge fix-badge--fail">Fix</span>
            ${esc(s.title)}
          </summary>
          <div class="fix-details-body">
            <p style="font-size:.8125rem;color:var(--color-muted);margin-bottom:.75rem">Copy this prompt and paste it into Lovable, Bolt, or v0 chat:</p>
            <div class="code-block-wrap">
              <pre class="code-block" id="lovable-${esc(s.signal)}-${i}">${esc(s.prompt)}</pre>
              <button class="copy-btn" data-target="lovable-${esc(s.signal)}-${i}">Copy prompt</button>
            </div>
          </div>
        </details>`).join('')}
    </div>` : '';

  return `
    <h2 class="dash-section-title">How to Fix What's Failing</h2>
    <p class="dash-section-sub">Step-by-step instructions for every failing signal. Copy the code snippets and apply them to your site.</p>
    ${signalFixes}
    ${schemaSection}
    ${llmsSection}
    ${lovableSection}`;
}

// Populated by /api/subscription/status on init — server-authoritative
let _reportPageTier = null;

function hasPaidTier(tier) {
  const TIERS = { snapshot: 1, fix: 2, report: 2, monitor: 3, deploy: 4 };
  if (_reportPageTier) {
    return (TIERS[_reportPageTier] ?? 0) >= (TIERS[tier] ?? 0);
  }
  // Fallback: localStorage (legacy Stripe session or test mode)
  const raw = localStorage.getItem('legibly_paid');
  if (!raw) return false;
  try {
    const val = JSON.parse(raw);
    const userTier = (typeof val === 'object' && val?.tier) ? val.tier : null;
    if (!userTier) return false;
    return (TIERS[userTier] ?? 0) >= (TIERS[tier] ?? 0);
  } catch {
    return false;
  }
}

function renderDeploy(data) {
  const githubConnected = !!localStorage.getItem('legibly_github');
  const hasDeployTier   = hasPaidTier('deploy');
  const hasReportTier   = hasPaidTier('report');

  // Fully paid for deploy — show GitHub connect form
  if (hasDeployTier && githubConnected) {
    return `
      <h2 class="dash-section-title">Deploy All Fixes to Your Site</h2>
      <p class="dash-section-sub">GitHub connected. Enter your repo URL and Legibly opens a PR with every fix applied — llms.txt, schema, robots.txt, and pre-rendering for Lovable/Vite sites.</p>
      <div class="deploy-connect">
        <div class="deploy-input-row">
          <label for="repo-input" class="sr-only">GitHub repo URL</label>
          <input type="url" id="repo-input" placeholder="github.com/yourname/yoursite" aria-describedby="deploy-error" />
          <button class="btn-primary" id="deploy-btn" style="font-size:.875rem;padding:.75rem 1.5rem">Deploy fixes →</button>
        </div>
        <p id="deploy-error" class="field-error" role="alert" aria-live="polite" hidden></p>
        <div id="deploy-result" hidden></div>
        <p class="deploy-stacks">Works with: Lovable · Vite · Next.js · Gatsby · Static sites</p>
      </div>`;
  }

  if (hasDeployTier) {
    return `
      <h2 class="dash-section-title">Connect GitHub to Deploy</h2>
      <p class="dash-section-sub">You've unlocked GitHub deploy. Connect your repo and we'll open a PR with every fix applied.</p>
      <div class="deploy-connect">
        <a href="/api/github/auth" class="btn-primary" style="display:inline-block;text-decoration:none;font-size:.875rem;padding:.75rem 1.5rem">Connect GitHub →</a>
        <p class="deploy-stacks">Works with: Lovable · Vite · Next.js · Gatsby · Static sites</p>
      </div>`;
  }

  // Has Full Report but not Deploy — show $70 add-on upsell
  if (hasReportTier) {
    return `
      <h2 class="dash-section-title">Add GitHub Deploy — $70</h2>
      <p class="dash-section-sub">You have the Full Report. Add automated deploy: we open a PR on your repo with every fix from this report applied.</p>
      <div class="deploy-upsell-card">
        <div class="deploy-upsell-price">$70 <span class="deploy-upsell-sub">add-on to your Full Report</span></div>
        <ul class="deploy-upsell-items">
          <li>vite-ssg / static prerender config committed</li>
          <li>llms.txt added to your repo root</li>
          <li>Organization schema inserted in HTML</li>
          <li>robots.txt updated for AI crawlers</li>
        </ul>
        <a href="/?upgrade=deploy" class="btn-primary" style="display:inline-block;text-decoration:none;font-size:.875rem;padding:.75rem 1.5rem">Add GitHub deploy — $70 →</a>
        <p style="margin-top:1rem;font-size:13px;color:var(--color-muted)">Or download the fix files and apply them manually to any platform:</p>
        <button id="fix-kit-btn" style="margin-top:.5rem;padding:.625rem 1.25rem;background:none;border:1.5px solid var(--color-border);border-radius:5px;font-family:inherit;font-size:.875rem;font-weight:600;cursor:pointer;color:var(--color-text)">Download Fix Kit (ZIP) →</button>
        <p class="deploy-stacks">Works with: Lovable · Vite · Next.js · Gatsby · Static sites</p>
      </div>`;
  }

  // No payment at all
  return `
    <h2 class="dash-section-title">Deploy All Fixes — $149</h2>
    <p class="dash-section-sub">Connect your GitHub repo. We write a PR with every fix applied. You click merge. Your grade improves.</p>
    <div class="deploy-connect">
      <div class="deploy-upsell-price">$149 <span class="deploy-upsell-sub">one-time · includes Full Report</span></div>
      <ul class="deploy-upsell-items">
        <li>Full Report with 12 prompts and all fixes</li>
        <li>GitHub PR with every fix committed</li>
        <li>30-day follow-up scan confirms grade improved</li>
      </ul>
      <a href="/?upgrade=deploy" class="btn-primary" style="display:inline-block;text-decoration:none;font-size:.875rem;padding:.75rem 1.5rem">Get Report + Deploy — $149 →</a>
      <p class="deploy-stacks">Works with: Lovable · Vite · Next.js · Gatsby · Static sites</p>
    </div>`;
}

// ── PDF download ──────────────────────────────────────────────────────────────
async function downloadPDF(url) {
  const btn = document.getElementById('pdf-btn');
  btn.disabled = true;
  btn.textContent = 'Generating PDF…';
  try {
    const res = await fetch('/api/report/pdf', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
    });
    if (!res.ok) throw new Error('PDF generation failed');
    const blob = await res.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `legibly-report-${safeOrigin(url).replace(/https?:\/\//,'')}.pdf`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 60_000);
    btn.textContent = 'Download PDF Report';
  } catch {
    btn.textContent = 'PDF failed — try again';
  } finally {
    btn.disabled = false;
  }
}

// ── Deploy wiring ─────────────────────────────────────────────────────────────
async function deployFixes(scanUrl) {
  const btn = document.getElementById('deploy-btn');
  const repoInput = document.getElementById('repo-input');
  const errorEl = document.getElementById('deploy-error');
  const resultEl = document.getElementById('deploy-result');
  const repoUrl = repoInput?.value?.trim();
  if (!repoUrl) { errorEl.textContent = 'Enter your GitHub repo URL.'; errorEl.hidden = false; return; }
  errorEl.hidden = true;
  btn.disabled = true;
  btn.textContent = 'Deploying…';
  try {
    const res = await fetch('/api/fix', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ repoUrl, scanUrl }),
    });
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error ?? 'Deploy failed'); }
    const { prUrl, fixCount, stack } = await res.json();
    resultEl.hidden = false;
    resultEl.innerHTML = `<div class="deploy-success"><strong>PR created — ${esc(String(fixCount))} fix${fixCount !== 1 ? 'es' : ''} applied</strong><br><a href="${esc(prUrl)}" target="_blank" rel="noopener">View PR on GitHub →</a></div>`;
    btn.textContent = 'Deployed ✓';
  } catch (err) {
    errorEl.textContent = err.message;
    errorEl.hidden = false;
    btn.disabled = false;
    btn.textContent = 'Retry →';
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
(async function init() {
  const params  = new URLSearchParams(location.search);
  const reportId = params.get('id');

  function showEmpty(msg) {
    document.querySelector('.dash-tabs').style.display = 'none';
    const el = document.getElementById('pane-empty');
    if (msg) el.querySelector('p').textContent = msg;
    el.classList.add('active');
  }

  function showLoading() {
    document.querySelector('.dash-tabs').style.display = 'none';
    const el = document.getElementById('pane-empty');
    el.innerHTML = '<p style="color:var(--color-muted);padding:4rem 1.5rem;text-align:center">Loading your report…</p>';
    el.classList.add('active');
  }

  let data;

  if (reportId) {
    // Fetch from API by ID (new flow — works for all users)
    showLoading();
    try {
      const res = await fetch(`/api/report/${encodeURIComponent(reportId)}`);
      if (res.status === 403) { showEmpty('This report is private. Sign in to view it.'); return; }
      if (!res.ok) { showEmpty('Report not found. It may have expired.'); return; }
      const row = await res.json();
      // API returns { id, scan_id, tier, report, ... } — merge with report object
      data = row.report ?? row;
      data._tier = row.tier ?? null;
    } catch {
      showEmpty('Could not load report. Check your connection and try again.');
      return;
    }
  } else {
    // Legacy: read from sessionStorage (backward compat for existing flow)
    const raw = sessionStorage.getItem('legibly_report');
    if (!raw) { showEmpty('No report found. Run a scan first.'); return; }
    try { data = JSON.parse(raw); } catch { showEmpty('Report data is corrupted.'); return; }
    if (!data || typeof data !== 'object') { showEmpty('No report found.'); return; }
  }

  // Fetch server-authoritative tier first, then fall back to report tier
  try {
    const subRes = await fetch('/api/subscription/status', { credentials: 'include' });
    if (subRes.ok) {
      const subData = await subRes.json();
      if (subData.tier) _reportPageTier = subData.tier;
    }
  } catch { /* unauthenticated or offline */ }

  // Also apply report's own tier (e.g. accessed via direct link without login)
  const VALID_TIERS = new Set(['snapshot', 'fix', 'report', 'monitor', 'deploy']);
  const safeTier = VALID_TIERS.has(data._tier) ? data._tier : null;
  if (safeTier && !_reportPageTier) {
    _reportPageTier = safeTier;
  }

  // Restore tab nav
  document.querySelector('.dash-tabs').style.display = '';

  // Set domain in header
  const domain = data.context?.domain ?? safeOrigin(data.url ?? '').replace(/https?:\/\//,'');
  document.getElementById('dash-domain').textContent = domain;
  document.title = `Legibly — ${domain} AI Visibility Report`;

  // Set llms origin if fix tab loads it
  setTimeout(() => {
    const el = document.getElementById('llms-origin');
    if (el) el.textContent = safeOrigin(data.url ?? '');
  }, 50);

  // Render all tabs — catch errors per-pane so one failure doesn't blank the whole dashboard
  const renders = [
    ['pane-overview', () => renderOverview(data)],
    ['pane-ai-view',  () => renderAiView(data)],
    ['pane-prompts',  () => renderPrompts(data)],
    ['pane-fixes',    () => renderFixes(data)],
    ['pane-deploy',   () => renderDeploy(data)],
  ];
  renders.forEach(([id, fn]) => {
    try {
      document.getElementById(id).innerHTML = fn();
    } catch(e) {
      document.getElementById(id).innerHTML = `<p style="color:var(--color-fail);padding:2rem 0">Error rendering this section.</p>`;
      console.error('Report render error in', id, e);
    }
  });

  // Activate overview tab
  document.getElementById('pane-overview').classList.add('active');
  document.querySelector('.dash-tab[data-tab="overview"]').classList.add('active');
  document.querySelector('.dash-tab[data-tab="overview"]').setAttribute('aria-selected', 'true');

  // Wire PDF button
  document.getElementById('pdf-btn')?.addEventListener('click', () => downloadPDF(data.url ?? ''));

  // Wire deploy button (after render)
  document.getElementById('deploy-btn')?.addEventListener('click', () => deployFixes(data.url ?? ''));

  // Wire fix kit download button
  document.getElementById('fix-kit-btn')?.addEventListener('click', async () => {
    const btn = document.getElementById('fix-kit-btn');
    btn.disabled = true; btn.textContent = 'Generating…';
    try {
      const scanId = data.scanId ?? new URLSearchParams(location.search).get('id');
      if (!scanId) throw new Error('No scan ID');
      window.location.href = `/api/fix-kit/${encodeURIComponent(scanId)}`;
      setTimeout(() => { btn.disabled = false; btn.textContent = 'Download Fix Kit →'; }, 2000);
    } catch {
      btn.disabled = false; btn.textContent = 'Download Fix Kit →';
    }
  });
})();
</script>
</body>
</html>
